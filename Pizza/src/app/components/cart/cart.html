<div class="container mt-4">
	<h2>Your Cart</h2>
	@if (cart.length === 0) {
		<p>Your cart is empty.</p>
		<a class="btn btn-primary" routerLink="/menu">Browse Menu</a>
	} @else {
		<table class="table mt-3">
			<thead>
				<tr>
					<th>cem</th>
					<th>Price</th>
					<th>Qty</th>
					<th>Subtotal</th>
					<th></th>
				</tr>
			</thead>
			<tbody>
				@for(c of cart; track c.id){
					<tr>
						<td>{{c.name}}</td>
						<td>${{c.price}}</td>
						<td>
							<button class="btn btn-sm btn-secondary" (click)=decrease(c)>-</button>
							<span class="mx-2">{{c.pquantity}}</span>
							<button class="btn btn-sm btn-secondary" (click)=increase(c)>+</button>
						</td>
						<td>${{ c.price * c.pquantity }}</td>
						<td><button class="btn btn-sm btn-danger" (click)=remove(c)>Remove</button></td>
					</tr>
				}
			</tbody>
		</table>

		<div class="d-flex justify-content-end">
			<h4>Total: ${{ getTotal() }}</h4>
		</div>

		<div class="mt-3 d-flex gap-2">
			<button class="btn btn-success" routerLink="/checkout">Checkout</button>
			<a class="btn btn-secondary" routerLink="/menu">Continue Shopping</a>
		</div>
	}
</div>
