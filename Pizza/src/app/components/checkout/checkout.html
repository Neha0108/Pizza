<div class="container mt-4">
	<h2>Checkout</h2>

	@if (cart.length === 0) {
		<p>Your cart is empty.</p>
		<a class="btn btn-primary" routerLink="/menu">Browse Menu</a>
	} @else {
		<div class="card p-3">
			<h4>Order Summary</h4>
			<ul class="list-group mb-3">
				@for(it of cart; track it.id){
					<li class="list-group-item d-flex justify-content-between align-items-center">
						<div>
							<strong>{{it.name}}</strong>
							<div class="text-muted">Qty: {{it.pquantity}}</div>
						</div>
						<div>${{ it.price * it.pquantity }}</div>
					</li>
				}
			</ul>

			<div class="mb-3">
				<label class="form-label">Name</label>
				<input class="form-control" [(ngModel)]="name" />
			</div>
			<div class="mb-3">
				<label class="form-label">Address</label>
				<textarea class="form-control" rows="3" [(ngModel)]="address"></textarea>
			</div>

			<div class="d-flex justify-content-between align-items-center">
				<h5>Total: ${{ getTotal() }}</h5>
				<button class="btn btn-success" (click)="confirmOrder()" routerLink="menu">Confirm Order</button>
			</div>
		</div>
	}
</div>
